<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フルスクリーンスライドショー</title>
    <style>
        /* 画面全体の余白をゼロにし、スクロールバーを非表示にする */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* スライドのコンテナ設定 */
        .slideshow-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* 各スライドの共通設定 */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease-in-out, visibility 1.5s;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* アクティブなスライドを表示 */
        .slide.active {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>

    <div class="slideshow-container">
        <div class="slide active" style="background-image: url('https://picsum.photos/1920/1080?random=1');"></div>
        <div class="slide" style="background-image: url('https://picsum.photos/1920/1080?random=2');"></div>
        <div class="slide" style="background-image: url('https://picsum.photos/1920/1080?random=3');"></div>
        <div class="slide" style="background-image: url('https://picsum.photos/1920/1080?random=4');"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slides = document.querySelectorAll('.slide');
            let currentIndex = 0;
            const intervalTime = 5000; // 5秒 (5000ミリ秒)

            function nextSlide() {
                // 現在のスライドから active クラスを削除
                slides[currentIndex].classList.remove('active');
                
                // 次のスライドのインデックスを計算 (最後の次は最初に戻る)
                currentIndex = (currentIndex + 1) % slides.length;
                
                // 次のスライドに active クラスを追加
                slides[currentIndex].classList.add('active');
            }

            // 5秒ごとに nextSlide 関数を実行
            setInterval(nextSlide, intervalTime);
        });
    </script>

</body>
</html>
